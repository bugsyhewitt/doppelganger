# HAProxy 1.7.9 front-end for the discrepant-pair lab.
#
# Pinned to 1.7.9 (CVE-2019-18277 era): this version mishandles certain
# Transfer-Encoding framing, so it disagrees with the pinned gunicorn 20.0.4
# back-end on message length -- a deterministic HTTP/1.1 desync. Frozen versions
# keep the discrepancy reproducible (V0.1-CRITERIA.md Testability).
#
# http-keep-alive keeps the front<->back connection pooled, which is what lets a
# smuggled prefix poison a following request (response-queue poisoning).

global
    maxconn 256

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option http-keep-alive

frontend fe
    bind *:80
    default_backend be

backend be
    server s1 backend:8000
